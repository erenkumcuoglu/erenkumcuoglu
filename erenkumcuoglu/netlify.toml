# erenkumcuoglu.com ana site netlify.toml
# Blog proxy - /blog/ isteklerini blog sitesine yonlendirir
# Kullanici ve Google sadece erenkumcuoglu.com/blog/ gorur

[[redirects]]
  from = "/blog/*"
  to = "https://erenkumcuoglublog.netlify.app/blog/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/blog"
  to = "https://erenkumcuoglublog.netlify.app/blog/"
  status = 200
  force = true
