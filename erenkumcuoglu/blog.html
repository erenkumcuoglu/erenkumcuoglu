<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Eren Kumcuoglu — Thoughts on Leadership, Fintech, and Digital Transformation." />
  <title>Blog — Eren Kumcuoglu</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Geist+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --p950: #0A0909;
      --p900: #111010;
      --p800: #1C1B1B;
      --p700: #2E2C2C;
      --p600: #413E3E;
      --p500: #5C5858;
      --s100: #F7F6F3;
      --s200: #EDEBE5;
      --s300: #DDD9D0;
      --a400: #C9A84C;
      --a500: #B8922E;
      --a600: #9E7A1A;
      --a700: #816418;
      --n0: #FFFFFF;
      --n100: #F4F3F0;
      --n200: #E8E6E1;
      --n300: #D2CFC8;
      --n400: #B0ABA2;
      --n500: #888380;
      --n600: #605D59;
      --n700: #3E3C39;
      --n800: #252320;
      --fd: "Cormorant Garamond", Georgia, serif;
      --fb: "Outfit", sans-serif;
      --fm: "Geist Mono", monospace;
      --ease: cubic-bezier(0, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--fb);
      background: var(--s100);
      color: var(--p900);
      -webkit-font-smoothing: antialiased;
    }

    ul {
      list-style: none;
    }

    a {
      text-decoration: none;
    }

    /* ── NAVBAR ──────────────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: rgba(247, 246, 243, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--n200);
    }

    .nav-brand {
      font-family: var(--fm);
      font-size: 0.64rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--p900);
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-link {
      font-family: var(--fb);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--n600);
      transition: color 300ms var(--ease);
    }

    .nav-link:hover {
      color: var(--a700);
    }

    .nav-link[aria-current="page"] {
      color: var(--a700);
      font-weight: 600;
    }

    /* ── BLOG HERO ───────────────────────────────────────────────────────── */
    .blog-hero {
      padding: 120px 20px 80px;
      background: var(--p900);
      color: var(--n0);
      text-align: center;
    }

    .blog-eyebrow {
      font-family: var(--fm);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--a400);
      margin-bottom: 24px;
    }

    .blog-title {
      font-family: var(--fd);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      margin-bottom: 32px;
    }

    .blog-intro {
      font-family: var(--fb);
      font-size: 1.125rem;
      font-weight: 300;
      color: var(--n400);
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── BLOG GRID ───────────────────────────────────────────────────────── */
    .blog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 40px;
    }

    .post-card {
      background: var(--n0);
      border: 1px solid var(--n200);
      border-radius: 4px;
      overflow: hidden;
      transition: all 400ms var(--ease);
    }

    .post-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(10, 9, 9, 0.08);
      border-color: var(--a400);
    }

    .post-image {
      width: 100%;
      height: 240px;
      background: var(--p800);
      object-fit: cover;
    }

    .post-content {
      padding: 32px;
    }

    .post-date {
      font-family: var(--fm);
      font-size: 0.64rem;
      color: var(--n500);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .post-title {
      font-family: var(--fd);
      font-size: 1.75rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 16px;
      color: var(--p900);
    }

    .post-excerpt {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--n600);
      margin-bottom: 24px;
    }

    .read-more {
      font-family: var(--fm);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--a700);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .read-more::after {
      content: '→';
      transition: transform 300ms var(--ease);
    }

    .post-card:hover .read-more::after {
      transform: translateX(4px);
    }

    @media (max-width: 768px) {
      .nav {
        padding: 0 20px;
      }
      .nav-links {
        display: none;
      }
      .blog-hero {
        padding: 80px 20px 60px;
      }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="eren-kumcuoglu.html" class="nav-brand">Eren Kumcuoglu</a>
    <ul class="nav-links">
      <li><a class="nav-link" href="eren-kumcuoglu.html#about">About</a></li>
      <li><a class="nav-link" href="eren-kumcuoglu.html#career">Career</a></li>
      <li><a class="nav-link" href="eren-kumcuoglu.html#achievements">Achievements</a></li>
      <li><a class="nav-link" href="eren-kumcuoglu.html#skills">Skills</a></li>
      <li><a class="nav-link" href="#" aria-current="page">Blog</a></li>
      <li><a class="nav-link" href="eren-kumcuoglu.html#contact">Contact</a></li>
    </ul>
  </nav>

  <header class="blog-hero">
    <p class="blog-eyebrow">Insights & Perspective</p>
    <h1 class="blog-title">The Strategic Mindset</h1>
    <p class="blog-intro">Reflections on scaling fintech, operational excellence, and the intersection of technology and leadership in high-stakes environments.</p>
  </header>

  <main class="blog-container">
    <div id="blog-grid" class="blog-grid">
      <!-- Posts will be loaded dynamically by blog-engine.js -->
    </div>
  </main>

  <script type="module" src="scripts/blog-data.js"></script>
  <script type="module" src="scripts/blog-engine.js"></script>
</body>

</html>
